<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>MullaeCompany</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      padding: 3rem 2rem;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 0.5s ease-out 0.1s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Pretendard Variable', sans-serif;
      font-size: 22px;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }
    .logo b { font-weight: 900; color: #1B5E3B; }
    .logo span { font-weight: 400; color: #5A7D62; }
    .subtitle {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 2.5rem;
      font-weight: 400;
    }
    .lang-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .lang-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid #e0e0e0;
      background: #fff;
      color: #555;
    }
    .lang-btn:hover {
      border-color: #1B5E3B;
      color: #1B5E3B;
    }
    .lang-btn--active {
      background: #1B5E3B;
      color: #fff;
      border-color: #1B5E3B;
    }
    .lang-btn--active:hover {
      background: #164d31;
      color: #fff;
    }
    .redirect-notice {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #ccc;
    }
    .dot {
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    @media (max-width: 400px) {
      .lang-buttons { flex-direction: column; align-items: center; }
      .lang-btn { width: 100%; max-width: 200px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo"><b>mullae</b><span>company</span></p>
    <p class="subtitle">Select your preferred language</p>
    <div class="lang-buttons">
      <a href="./ko/" class="lang-btn" id="btn-ko">한국어</a>
      <a href="./en/" class="lang-btn" id="btn-en">English</a>
    </div>
    <p class="redirect-notice">
      Redirecting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </p>
  </div>

  <script>
    (function () {
      var userInteracted = false;

      function markInteraction() { userInteracted = true; }
      document.addEventListener('click', markInteraction, { once: true });
      document.addEventListener('touchstart', markInteraction, { once: true });
      document.addEventListener('keydown', markInteraction, { once: true });

      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      var isKo = lang.startsWith('ko');
      var target = isKo ? './ko/' : './en/';

      // Highlight detected language
      document.getElementById(isKo ? 'btn-ko' : 'btn-en').classList.add('lang-btn--active');

      window.location.href = target;
    })();
  </script>
</body>
</html>
