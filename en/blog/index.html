<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — MullaeCompany</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      background: #fff; color: #1a1a1a; line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: color 0.25s ease; }

    /* ── Header ── */
    header {
      position: fixed; top:0; left:0; right:0; z-index:100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      height: 72px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 19px; letter-spacing: -0.5px; }
    .logo b { font-weight: 900; color: #1B5E3B; }
    .logo span { font-weight: 400; color: #5A7D62; }
    nav { display: flex; gap: 36px; }
    nav a { font-size: 13px; font-weight: 500; color: #999; letter-spacing: 0.2px; }
    nav a:hover { color: #1a1a1a; }
    nav a.active { color: #1B5E3B; }
    .lang {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      color: #aaa; border: 1px solid #ddd; padding: 5px 12px; letter-spacing: 1px;
    }
    .lang:hover { border-color: #1B5E3B; color: #1B5E3B; }

    /* ── Content ── */
    .content { max-width: 780px; margin: 0 auto; padding: 140px 32px 80px; }
    .page-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 3px; color: #bbb; margin-bottom: 16px;
    }
    .page-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 48px;
    }

    /* ── Post list ── */
    .post-list { display: flex; flex-direction: column; }
    .post-item {
      display: block; padding: 32px 0; border-bottom: 1px solid #f0f0f0;
      transition: opacity 0.2s ease;
    }
    .post-item:first-child { border-top: 1px solid #f0f0f0; }
    .post-item:hover { opacity: 0.7; }
    .post-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: #bbb; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .post-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
    .post-summary { font-size: 14px; color: #888; line-height: 1.7; }
    .post-tags { margin-top: 10px; display: flex; gap: 8px; }
    .post-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: #aaa; letter-spacing: 0.5px;
      border: 1px solid #eee; padding: 2px 10px;
    }
    .empty { text-align: center; padding: 80px 0; font-size: 15px; color: #bbb; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #eee; padding: 28px 32px 32px;
      max-width: 1100px; margin: 0 auto;
    }
    .footer-logo { font-size: 15px; letter-spacing: -0.3px; margin-bottom: 12px; }
    .footer-logo b { font-weight: 900; color: #1B5E3B; }
    .footer-logo span { font-weight: 400; color: #5A7D62; }
    .footer-info { font-size: 11px; color: #bbb; line-height: 1.9; }
    .footer-bottom {
      margin-top: 24px; padding-top: 20px; border-top: 1px solid #f0f0f0;
      font-family: 'DM Mono', monospace; font-size: 10px; color: #ccc; letter-spacing: 0.5px;
    }

    /* ── Hamburger ── */
    .menu-btn {
      display: none; background: none; border: none; cursor: pointer;
      width: 28px; height: 20px; position: relative; z-index: 200;
    }
    .menu-btn span {
      display: block; width: 100%; height: 1.5px; background: #1a1a1a;
      position: absolute; left: 0; transition: all 0.3s ease;
    }
    .menu-btn span:nth-child(1) { top: 0; }
    .menu-btn span:nth-child(2) { top: 9px; }
    .menu-btn span:nth-child(3) { top: 18px; }
    .menu-btn.active span:nth-child(1) { top: 9px; transform: rotate(45deg); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { top: 9px; transform: rotate(-45deg); }
    .mobile-nav {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.98); z-index: 150;
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .mobile-nav a:hover { color: #1B5E3B; }
    .mobile-nav .lang {
      font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
      color: #aaa; border: 1px solid #ddd; padding: 6px 16px; letter-spacing: 1px;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .header-inner { padding: 0 20px; height: 60px; }
      nav { display: none; }
      .lang { display: none; }
      .menu-btn { display: block; }
      .content { padding: 100px 20px 60px; }
      .page-title { font-size: 22px; }
      footer { padding: 36px 20px 32px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="../" class="logo"><b>mullae</b><span>company</span></a>
      <nav>
        <a href="../#about">About</a>
        <a href="../#brand">Brand</a>
        <a href="./" class="active">Blog</a>
        <a href="../#news">News</a>
        <a href="../#careers">Careers</a>
      </nav>
      <a href="../../ko/blog/" class="lang">KO</a>
      <button class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <a href="../">Home</a>
    <a href="./">Blog</a>
    <a href="../#news" onclick="toggleMenu()">News</a>
    <a href="../../ko/blog/" class="lang">KO</a>
  </div>

  <div class="content">
    <p class="page-label">BLOG</p>
    <h1 class="page-title">Inside Our Ingredients</h1>
    <div id="post-list">
      <p class="empty">Posts are on the way.</p>
    </div>
  </div>

  <footer>
    <div class="footer-logo"><b>mullae</b><span>company</span></div>
    <div class="footer-info">
      <span>MullaeCompany Co.,Ltd.</span> · <span>Yeongdeungpo-gu, Seoul</span>
    </div>
    <div class="footer-bottom">
      &copy; 2025 MULLAE COMPANY. ALL RIGHTS RESERVED.
    </div>
  </footer>

  <script>
    (function () {
      fetch('../../data/blog-en.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var posts = data.posts || [];
          if (posts.length === 0) return;
          var container = document.getElementById('post-list');
          var html = '<div class="post-list">';
          posts.forEach(function (post) {
            html += '<a class="post-item" href="post.html?id=' + post.id + '">';
            html += '<p class="post-date">' + post.date + '</p>';
            html += '<p class="post-title">' + post.title + '</p>';
            html += '<p class="post-summary">' + post.summary + '</p>';
            if (post.tags && post.tags.length) {
              html += '<div class="post-tags">';
              post.tags.forEach(function (t) { html += '<span class="post-tag">' + t + '</span>'; });
              html += '</div>';
            }
            html += '</a>';
          });
          html += '</div>';
          container.innerHTML = html;
        })
        .catch(function () {});
    })();
  </script>
  <script>
    function toggleMenu() {
      document.getElementById('mobileNav').classList.toggle('open');
      document.querySelector('.menu-btn').classList.toggle('active');
    }
  </script>
</body>
</html>
