<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <title>채용 — (주)문래컴퍼니</title>
  <meta name="description" content="(주)문래컴퍼니 채용 정보 — 함께 성장할 인재를 찾습니다">
  <link rel="canonical" href="https://mlc.co.kr/ko/careers/">
  <link rel="alternate" hreflang="ko" href="https://mlc.co.kr/ko/careers/">
  <link rel="alternate" hreflang="en" href="https://mlc.co.kr/en/careers/">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      background: #fff; color: #1a1a1a; line-height: 1.8;
      word-break: keep-all; overflow-wrap: break-word;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; transition: color 0.25s ease; }

    /* ── Header ── */
    header {
      position: fixed; top:0; left:0; right:0; z-index:100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      height: 72px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 19px; letter-spacing: -0.5px; }
    .logo b { font-weight: 900; color: #1B5E3B; }
    .logo span { font-weight: 400; color: #5A7D62; }
    nav { display: flex; gap: 36px; }
    nav a { font-size: 13px; font-weight: 500; color: #999; letter-spacing: 0.2px; }
    nav a:hover { color: #1a1a1a; }
    nav a.active { color: #1B5E3B; }
    .lang {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      color: #aaa; border: 1px solid #ddd; padding: 5px 12px; letter-spacing: 1px;
    }
    .lang:hover { border-color: #1B5E3B; color: #1B5E3B; }

    /* ── Back link ── */
    .back-link {
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px;
      color: #bbb; margin-bottom: 40px; display: inline-block;
    }
    .back-link:hover { color: #1B5E3B; }

    /* ── Content ── */
    .content { max-width: 780px; margin: 0 auto; padding: 140px 32px 80px; }
    .page-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 3px; color: #bbb; margin-bottom: 16px;
    }
    .page-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 48px;
    }

    /* ── Careers ── */
    .careers-empty { text-align: center; padding: 80px 0; }
    .careers-empty p { font-size: 15px; color: #bbb; letter-spacing: -0.3px; margin-bottom: 12px; }
    .careers-empty a {
      font-size: 13px; color: #888;
      border-bottom: 1px solid #ddd; padding-bottom: 2px;
      transition: all 0.25s ease;
    }
    .careers-empty a:hover { color: #1B5E3B; border-color: #1B5E3B; }

    /* ── Position list ── */
    .position-list { display: flex; flex-direction: column; }
    .position-item {
      display: block; padding: 32px; border: 1px solid #f0f0f0;
      margin-bottom: 16px; transition: all 0.2s ease;
    }
    .position-item:hover { border-color: #1B5E3B; }
    .position-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .position-type { font-size: 13px; color: #888; margin-bottom: 12px; }
    .position-desc { font-size: 14px; color: #666; line-height: 1.7; }

    /* ── Pagination ── */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 32px;
    }
    .pagination button {
      padding: 8px 12px; font-size: 13px; font-weight: 500;
      font-family: 'DM Mono', monospace;
      border: 1px solid #e0e0e0; background: #fff;
      color: #666; cursor: pointer; transition: all 0.2s ease;
    }
    .pagination button:hover:not(:disabled) {
      border-color: #1B5E3B; color: #1B5E3B;
    }
    .pagination button.active {
      background: #1B5E3B; color: #fff; border-color: #1B5E3B;
    }
    .pagination button:disabled {
      opacity: 0.3; cursor: not-allowed;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #eee; padding: 28px 32px 32px;
      max-width: 1100px; margin: 0 auto;
    }
    .footer-logo { margin-bottom: 0; }
    .footer-corp { font-family: 'Gowun Batang', serif; font-size: 10px; font-weight: 400; color: #aaa; letter-spacing: 3px; margin-bottom: -2px; }
    .footer-name { font-family: 'Gowun Batang', serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; margin-top: 0; }
    .footer-name b { font-weight: 700; color: #1a1a1a; }
    .footer-name span { font-weight: 700; color: #5A7D62; }
    .footer-info { font-size: 11px; color: #bbb; line-height: 1.9; }
    .footer-bottom {
      margin-top: 24px; padding-top: 20px; border-top: 1px solid #f0f0f0;
      font-family: 'DM Mono', monospace; font-size: 10px; color: #ccc; letter-spacing: 0.5px;
    }

    /* ── Hamburger ── */
    .menu-btn {
      display: none; background: none; border: none; cursor: pointer;
      width: 28px; height: 20px; position: relative; z-index: 200;
    }
    .menu-btn span {
      display: block; width: 100%; height: 1.5px; background: #1a1a1a;
      position: absolute; left: 0; transition: all 0.3s ease;
    }
    .menu-btn span:nth-child(1) { top: 0; }
    .menu-btn span:nth-child(2) { top: 9px; }
    .menu-btn span:nth-child(3) { top: 18px; }
    .menu-btn.active span:nth-child(1) { top: 9px; transform: rotate(45deg); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { top: 9px; transform: rotate(-45deg); }
    .mobile-nav {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.98); z-index: 150;
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .mobile-nav a:hover { color: #1B5E3B; }
    .mobile-nav .lang {
      font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
      color: #aaa; border: 1px solid #ddd; padding: 6px 16px; letter-spacing: 1px;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .header-inner { padding: 0 20px; height: 60px; }
      nav { display: none; }
      .header-inner > .lang { margin-left: auto; margin-right: 12px; }
      .menu-btn { display: block; }
      .content { padding: 100px 20px 60px; }
      .page-title { font-size: 22px; }
      footer { padding: 36px 20px 32px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="../" class="logo"><b>mullae</b><span>company</span></a>
      <nav>
        <a href="../#about">회사소개</a>
        <a href="../#brand">브랜드</a>
        <a href="../blog/">블로그</a>
        <a href="../news/">뉴스</a>
        <a href="./" class="active">채용</a>
      </nav>
      <a href="../../en/careers/" class="lang">EN</a>
      <button class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <a href="../" onclick="toggleMenu()">홈</a>
    <a href="../#about" onclick="toggleMenu()">회사소개</a>
    <a href="../#brand" onclick="toggleMenu()">브랜드</a>
    <a href="../blog/" onclick="toggleMenu()">블로그</a>
    <a href="../news/" onclick="toggleMenu()">뉴스</a>
    <a href="./" onclick="toggleMenu()">채용</a>
    <a href="../../en/careers/" class="lang">EN</a>
  </div>

  <div class="content">
    <a href="../" class="back-link">← HOME</a>
    <p class="page-label">CAREERS</p>
    <h1 class="page-title">채용</h1>
    <div id="careers-list">
      <div class="careers-empty">
        <p>채용 공고를 준비하고 있습니다.</p>
        <a href="mailto:hr@mlc.co.kr">hr@mlc.co.kr</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">
          <div class="footer-corp">주식회사</div>
          <div class="footer-name"><b>문래</b><span>컴퍼니</span></div>
        </div>
    <div class="footer-info">
      서울특별시 영등포구 문래동
    </div>
    <div class="footer-bottom">
      &copy; 2025 MULLAECOMPANY CO.,LTD. ALL RIGHTS RESERVED.
    </div>
  </footer>

  <script>
    (function () {
      var allPositions = [];
      var currentPage = 1;
      var itemsPerPage = 5;

      fetch('../../data/careers.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          allPositions = data.positions || [];
          renderPage();
        })
        .catch(function () {});

      function renderPage() {
        var container = document.getElementById('careers-list');

        if (allPositions.length === 0) {
          container.innerHTML = '<div class="careers-empty"><p>채용 공고를 준비하고 있습니다.</p><a href="mailto:hr@mlc.co.kr">hr@mlc.co.kr</a></div>';
          return;
        }

        var totalPages = Math.ceil(allPositions.length / itemsPerPage);
        var startIndex = (currentPage - 1) * itemsPerPage;
        var endIndex = Math.min(startIndex + itemsPerPage, allPositions.length);
        var positionsToShow = allPositions.slice(startIndex, endIndex);

        var html = '<div class="position-list">';
        positionsToShow.forEach(function (position) {
          html += '<div class="position-item">';
          html += '<p class="position-title">' + position.title + '</p>';
          html += '<p class="position-type">' + position.type + '</p>';
          if (position.description) html += '<p class="position-desc">' + position.description + '</p>';
          html += '</div>';
        });
        html += '</div>';

        // 페이지네이션
        if (totalPages > 1) {
          html += '<div class="pagination">';
          html += '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>이전</button>';

          for (var i = 1; i <= totalPages; i++) {
            html += '<button onclick="goToPage(' + i + ')" ' + (i === currentPage ? 'class="active"' : '') + '>' + i + '</button>';
          }

          html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>다음</button>';
          html += '</div>';
        }

        container.innerHTML = html;
      }

      window.goToPage = function(page) {
        var totalPages = Math.ceil(allPositions.length / itemsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
    })();
  </script>
  <script>
    function toggleMenu() {
      document.getElementById('mobileNav').classList.toggle('open');
      document.querySelector('.menu-btn').classList.toggle('active');
    }
  </script>
</body>
</html>
