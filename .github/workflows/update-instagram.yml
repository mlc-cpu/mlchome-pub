name: Update Instagram Followers

on:
  schedule:
    # 매일 오전 9시 KST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-followers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Fetch follower count
        id: fetch
        run: |
          node << 'SCRIPT'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({
              userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1'
            });

            await page.goto('https://www.instagram.com/oneul_pharmacy/', {
              waitUntil: 'networkidle',
              timeout: 30000
            });

            // 팔로워 수 추출 (meta 태그 또는 페이지 내 텍스트)
            let count = null;

            // 방법 1: og:description meta 태그 ("1.6만 Followers" 등)
            const desc = await page.$eval('meta[property="og:description"]', el => el.content).catch(() => null);
            if (desc) {
              const m = desc.match(/([\d,.]+[만KMk]?)\s*[Ff]ollowers/);
              if (m) {
                let raw = m[1];
                if (raw.includes('만')) {
                  count = Math.round(parseFloat(raw.replace('만', '')) * 10000);
                } else if (raw.match(/[KkMm]/)) {
                  const num = parseFloat(raw.replace(/[KkMm]/g, ''));
                  count = raw.match(/[Mm]/) ? Math.round(num * 1000000) : Math.round(num * 1000);
                } else {
                  count = parseInt(raw.replace(/,/g, ''), 10);
                }
              }
            }

            // 방법 2: 페이지 텍스트에서 직접 추출
            if (!count) {
              const text = await page.textContent('body');
              const m = text.match(/([\d,]+)\s*[Ff]ollowers/);
              if (m) count = parseInt(m[1].replace(/,/g, ''), 10);
            }

            await browser.close();

            if (!count || isNaN(count)) {
              console.error('팔로워 수 추출 실패');
              process.exit(1);
            }

            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `count=${count}\n`);
            console.log(`팔로워 수: ${count}`);
          })();
          SCRIPT

      - name: Update social.json
        run: |
          COUNT=${{ steps.fetch.outputs.count }}
          TODAY=$(date -u +%Y-%m-%d)

          python3 << PYEOF
          import json

          count = ${COUNT}
          today = "${TODAY}"

          if count >= 10000:
              display_ko = f"{count/10000:.1f}만"
          else:
              display_ko = f"{count:,}"

          if count >= 1000:
              display_en = f"{count/1000:.1f}K"
          else:
              display_en = str(count)

          data = {
              "instagram": {
                  "handle": "@oneul_pharmacy",
                  "followers": display_ko,
                  "followers_en": display_en,
                  "followers_raw": count,
                  "updated": today
              }
          }

          with open("data/social.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Updated: {display_ko} / {display_en}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/social.json && echo "변경 없음" && exit 0
          git add data/social.json
          git commit -m "chore: update instagram followers (${{ steps.fetch.outputs.count }})"
          git push
